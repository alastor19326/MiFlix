<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MiFlix PRO</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="imagenes/logo.png" type="image/png">
</head>
<body>

<header>
    <h1>🔥 MiFlix PRO</h1>

    <div class="busqueda">
    <input type="text" id="buscador" placeholder="Buscar...">
    
    <button id="btnBuscar">
        <svg class="icono" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="black">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35m1.6-5.4a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
    </button>
</div>
</header>

<h2>🔥 Tendencias</h2>
<div id="tendencias" class="fila"></div>

<h2>⭐ Favoritos</h2>
<div id="favoritos" class="fila"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span id="cerrar">&times;</span>
        <iframe id="trailer" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
